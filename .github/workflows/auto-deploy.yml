name: Auto Deploy WordPress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 拉取代码并部署
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.PORT }}
        script: |
          set -e
          echo "🚀 开始部署..."
          cd /opt/projects/blog/wordpress
          echo "📥 拉取最新代码..."
          git pull origin main
          echo "🔐 设置权限..."
          sudo chown -R www-data:www-data wp-content/
          echo "🧹 清理缓存..."
          docker exec wordpress wp cache flush 2>/dev/null || true
          echo "✅ 部署完成!"
          echo "📊 提交信息: $(git log -1 --pretty='%h - %s')"
