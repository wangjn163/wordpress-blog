name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 测试 Secrets 配置
      run: |
        echo "检查 Secrets 是否存在..."
        echo "HOST: ${{ secrets.HOST != '' }}"
        echo "USER: ${{ secrets.USER != '' }}"
        echo "PORT: ${{ secrets.PORT != '' }}"
        echo "KEY 长度: ${{ secrets.KEY != '' }}"
        
    - name: 📡 测试 SSH 连接
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.PORT }}
        script: |
          echo "✅ SSH 连接成功!"
          hostname
          whoami
          date
